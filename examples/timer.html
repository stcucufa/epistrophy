<!DOCTYPE html>
<html>
    <head>
        <title>Timer</title>
        <meta charset="utf8">
        <link rel="stylesheet" href="examples.css"/>
        <link rel="stylesheet" href="../lib/style.css"/>
        <script type="module">

import { VM } from "../lib/vm.js";
import { TransportBar } from "../lib/transport-bar.js";
import { Timeline } from "../lib/timeline.js";
import { Thread } from "../lib/thread.js";
import { timecount } from "../lib/util.js";
import * as time from "../lib/time.js";

const vm = VM();
document.body.appendChild(TransportBar(vm).element);
document.body.appendChild(Timeline(vm).element);

// ----8<--------8<--------8<--------8<--------8<--------8<--------8<----

const range = document.querySelector(`input[type="range"]`);
const button = document.querySelector("button");
const progress = document.querySelector("progress");

const duration = document.querySelector("span.duration");
const elapsed = document.querySelector("span.elapsed");

vm.start().keepAlive().spawn().
    constant(30).
    spawn(Thread().
        repeat().
            set(range, "value").
            instant(d => timecount(d * 1000)).
            set(duration, "textContent").
            receive(range, "input").
            instant(e => e.target.valueAsNumber).
        loop()
    ).
    spawn(Thread().receive(button, "click")).
    first().
    constant(true).
    set(range, "disabled").
    set(button, "disabled").
    instant(() => `${range.valueAsNumber}s`).
    spawn(Thread().
        instant(time.read).
        setAttribute(progress, "max").
        repeat().
            instant((_, t) => t).
            setAttribute(progress, "value").
            spawn(Thread().
                instant(timecount).
                set(elapsed, "textContent")
            ).
            delay(100).
        loop()
    ).
    spawn(Thread().delay()).
    first().
    effect(dur => { alert(`Done after ${timecount(dur)}!`); });

// ----8<--------8<--------8<--------8<--------8<--------8<--------8<----

        </script>
    </head>
    <body>
        <p><a href="index.html">Back</a></p>
        <h1>Timer</h1>
        <p>Timer example inspired by <a href="https://eugenkiss.github.io/7guis/tasks/#timer">7
            GUIs</a>. Note that the delay cannot be changed once it is set (issue 1R0K).</p>
        <p>
            <label>Set timer to <input type="range" min="0" max="90" value="0"/></label>
            (<span class="duration">0</span>).
        </p>
        <p>
            <button type="button">Start</button>
            <label>Elapsed time: <progress></progress></label> (<span class="elapsed">0</span>)
        </p>
        <script src="source.js" type="module"></script>
    </body>
</html>
